name: "MT-NLP Lab"
slug: mt-nlp
tagline: "Machine Translation and Natural Language Processing"
description: "We work on building intelligent systems that understand, interpret and generate human language."
icon: "mt-nlp"

overview:
  about: |
    The MT-NLP Lab at LTRC, IIIT-H, focuses on a wide range of NLP problems including syntax and parsing, semantics, discourse processing, machine translation, and computational models inspired by linguistics and machine learning.

    We also develop resources and tools for Indian languages and contribute to open-source NLP ecosystem.
  highlights:
    - "Developing computational models for Indian languages"
    - "Semantic parsing and discourse representation"
    - "Treebank and annotation tool development"
    - "English to Indian languages machine translation"

research_areas:
  - title: "Computational Grammatical Model"
    description: "Development of the Computational Paninian Grammar framework, treebanks for Hindi and Urdu, and studies in language typology."
  - title: "Parsing"
    description: "Constraint-based and data-driven parsers for Indian languages, along with shallow parsers, part-of-speech taggers, and morphological analyzers."
  - title: "Machine Translation"
    description: "Transfer-based approaches, automatic learning of transfer rules, and statistical machine translation from English to Indian languages."
  - title: "Semantics"
    description: "Purpose-net and unsupervised/semi-supervised word category disambiguation."
  - title: "Dialogue and Discourse Analysis"
    description: "Anaphora resolution in text and generation of sentences from words."

projects:
  - title: "Indian Language to Indian Language MT (ILMT) Phase-II"
    description: "Machine translation among Indian languages, developed as a consortium project funded by the Department of Information Technology, Govt. of India (2010-2015)."
    status: "Completed"
  - title: "English to Indian Language MT System Phase-II"
    description: "Development of English to Indian language machine translation as a consortium project funded by the Department of Information Technology, Govt. of India (2010-2013)."
    status: "Completed"
  - title: "SSMT - Pilot Systems Development"
    description: "Speech-to-speech machine translation pilot systems, funded by the Office of the Principal Scientific Advisor (2020-2021)."
    status: "Completed"
  - title: "Bahubhashak - IL-IL MT (Pilot Project)"
    description: "Indian language to Indian language machine translation pilot, funded by the Ministry of Electronics and Information Technology, Govt. of India (2020-2021)."
    status: "Completed"
  - title: "SWAYAM - National MOOCs"
    description: "Transcription, translation and subtitling of MOOC content, funded by the Ministry of Human Resource Development, Govt. of India (2019-2021)."
    status: "Completed"
  - title: "Hindi to English MT for Judicial Domain (HEMTS)"
    description: "Machine translation for the judicial domain, funded by the Ministry of Electronics and Information Technology, Govt. of India (2017-2020)."
    status: "Completed"
  - title: "Multilingual Document Summarization in Quasi-Stationary Environment"
    description: "Document summarization research funded by the Defence Research & Development Organisation, Govt. of India (2019-2022)."
    status: "Completed"
  - title: "Multi-Representational and Multi-Layered Treebank for Hindi and Urdu"
    description: "Treebank development for Hindi and Urdu, funded by the NSF, USA (2008-2011)."
    status: "Completed"
