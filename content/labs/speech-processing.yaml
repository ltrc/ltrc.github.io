name: "Speech Processing Lab"
slug: speech-processing
tagline: "Speech and Vision Research"
description: "Building robust speech systems for recognition, synthesis, and retrieval."
icon: "speech"

overview:
  about: |
    The objective of the Speech and Vision Lab (SVL) is to conduct goal oriented basic research, addressing fundamental issues involved in building robust speech-to-text systems, natural sounding text-to-speech systems, spoken/audio information retrieval and biometrics using speech and video.

    Towards these goals the lab works on a speech translation system from one Indian language to another, secure access to information using speech mode, biometrics involving speech, image, text and audio-visual information, content-based information storage and retrieval, and the development of a phonetic engine for Indian languages.
  highlights:
    - "Speech translation between Indian languages"
    - "Secure access to information using speech"
    - "Biometrics using speech, image and audio-visual information"
    - "Content-based information storage and retrieval"
    - "Phonetic engine for Indian languages"

research_areas:
  - title: "Speech Recognition"
    description: "Building robust speech-to-text systems that work across diverse Indian languages, accents, and acoustic environments."
  - title: "Text-to-Speech Synthesis"
    description: "Developing natural sounding text-to-speech systems for Indian languages with focus on prosody and naturalness."
  - title: "Speaker Recognition"
    description: "Research on biometric identification using speech signals, including speaker verification and identification systems."
  - title: "Language Identification"
    description: "Automatic identification of spoken language from audio signals, particularly for Indian languages."
  - title: "Emotion Recognition"
    description: "Speech processing in emotion conditions, including emotion detection and emotion-aware speech conversion."

projects:
  - title: "Stutter Detection Platform"
    description: "Speech analysis platform created for All India Institute of Speech and Hearing, Mysore for detecting stuttering patterns."
    status: "Completed"
  - title: "Speech-to-Speech Translation"
    description: "Performance measurement platform for broadcast speeches and talks, as part of the Bhashini project."
    status: "Active"

