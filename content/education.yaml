heading: "Education"
description: "From undergraduate foundations to doctoral seminars, the LTRC curriculum spans the breadth of natural language processing, speech and language technology — taught by the same faculty who lead the centre's research."

programs:
  - title: "Foundations of Natural Language Processing"
    description: "Morphology, parsing, semantics and language modelling — the core building blocks that every language technologist works from."
    level: "UG / PG"
  - title: "Statistical and Neural Machine Translation"
    description: "Phrase-based systems, attention and transformer models, with a focus on Indian and other low-resource languages."
    level: "PG"
  - title: "Speech Technology"
    description: "Automatic speech recognition, text-to-speech synthesis and speaker recognition, from signal to spoken language."
    level: "PG"
  - title: "Information Retrieval and Extraction"
    description: "Search, ranking and knowledge extraction for complex, multilingual information needs."
    level: "PG"
  - title: "Introduction to Linguistics"
    description: "Phonetics, morphology, syntax and semantics — the linguistic grounding behind computational language work."
    level: "UG"
  - title: "Computational Linguistics II: Computational Semantics and Discourse Parsing"
    description: "Meaning representation, discourse structure and parsing beyond the sentence boundary."
    level: "PG"
  - title: "Speech Signal Processing"
    description: "Digital signal analysis and time-frequency methods applied to the acoustics of speech."
    level: "UG / PG"
  - title: "Social Computing"
    description: "Computational study of language and behaviour across social platforms and online communities."
    level: "PG"
  - title: "IASNLP Summer School"
    description: "The annual IIIT-H Advanced Summer School on NLP — an intensive programme open to researchers and students worldwide."
    level: "Annual"
